<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeadHunter — Pesquisar Negócios nos Açores | Mapa Interativo</title>
  <meta name="description" content="Explora o mapa interativo, filtra por ilha e categoria, e seleciona negócios dos Açores com gaps digitais para descarregar o teu PDF de leads." />
  <link rel="canonical" href="https://leadhunter.pedropaula.com/app.html" />
  <meta name="robots" content="index, follow" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { margin: 0; background: #060a10; color: white; overflow: hidden; }

    /* ── Map ── */
    #map {
      position: fixed; inset: 0;
      top: var(--topbar-h, 158px);
      bottom: 0; z-index: 1;
      transition: bottom .3s cubic-bezier(.4,0,.2,1), top .2s ease;
    }
    #map.bar-open { bottom: 72px; }

    /* Leaflet dark tiles */
    .leaflet-tile { filter: brightness(.85) saturate(.7) invert(1) hue-rotate(180deg); }
    .leaflet-container { background: #111827; }

    /* ── Markers ── */
    .lh-marker {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: white;
      border: 2px solid rgba(255,255,255,.3);
      box-shadow: 0 2px 10px rgba(0,0,0,.5);
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
      user-select: none;
    }
    .lh-marker:hover { transform: scale(1.18); box-shadow: 0 4px 16px rgba(0,0,0,.6); }
    .lh-marker.selected {
      border: 3px solid white !important;
      background: #10f5a0 !important;
      color: #060a10 !important;
      transform: scale(1.18);
      box-shadow: 0 0 0 4px rgba(16,245,160,.28), 0 4px 14px rgba(0,0,0,.5);
    }
    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: #0d1220;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px;
      box-shadow: 0 24px 64px rgba(0,0,0,.65);
      padding: 0; overflow: hidden;
    }
    .leaflet-popup-content {
      margin: 0;
      width: clamp(270px, calc(100vw - 32px), 310px) !important;
    }
    .leaflet-popup-tip { background: #0d1220; }
    .leaflet-popup-close-button { color: #4b5563 !important; font-size: 18px !important; padding: 10px 12px !important; z-index: 5; }
    .leaflet-popup-close-button:hover { color: white !important; }

    /* ── Top bar ── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 30;
      background: rgba(6,10,16,.97);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    /* ── Cat scroll ── */
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Search input ── */
    #search-input {
      width: 100%; background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; color: white;
      font-size: 13px; padding: 8px 12px 8px 34px;
      outline: none; transition: border-color .2s, background .2s;
    }
    #search-input:focus { border-color: rgba(16,245,160,.4); background: rgba(255,255,255,.09); }
    #search-input::placeholder { color: #4b5563; }

    /* ── Bottom bar ── */
    #bottom-bar {
      transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .3s ease;
    }
    #bottom-bar.hidden-bar { transform: translateY(100%); opacity: 0; pointer-events: none; }

    /* ── Animations ── */
    @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
    .pop { animation: pop .2s ease; }
    @keyframes fade-in { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .fade-in { animation: fade-in .2s ease; }

    /* ── Loading spinner ── */
    #loading {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #060a10;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid rgba(16,245,160,.15);
      border-top-color: #10f5a0;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Island chip scroll */
    .island-scroll::-webkit-scrollbar { display: none; }
    .island-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

<!-- ══ LOADING ══ -->
<div id="loading">
  <div class="spinner"></div>
  <div style="color:#4b5563;font-size:13px;font-weight:500">A carregar negócios…</div>
</div>

<!-- ══ TOP BAR ══ -->
<div id="topbar">
  <!-- Row 1: Logo + counter + search toggle -->
  <div class="flex items-center gap-3 px-3 h-12 border-b border-white/[.04]">
    <a href="index.html" class="flex items-center shrink-0" aria-label="LeadHunter">
      <img src="logo.svg" alt="LeadHunter" style="height:26px;width:auto" />
    </a>

    <!-- Search bar -->
    <div class="flex-1 relative">
      <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 pointer-events-none" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" type="text" placeholder="Pesquisar negócio…" autocomplete="off" oninput="onSearch(this.value)" />
    </div>

    <!-- Selected counter (compact) -->
    <div id="top-counter" class="hidden items-center gap-1.5 text-[12px] shrink-0">
      <span id="top-count" class="font-bold text-[#10f5a0]">0</span>
      <span class="text-gray-600">sel.</span>
      <span id="top-price" class="font-semibold text-white"></span>
    </div>
  </div>

  <!-- Row 2: Category filter chips -->
  <div class="relative border-b border-white/[.04]">
    <div class="cat-scroll overflow-x-auto flex gap-1.5 px-3 py-2 pr-10">
      <button onclick="filterCategory('all')" data-cat="all"
        class="cat-btn shrink-0 px-3 py-1.5 rounded-full text-[11px] font-semibold border transition-all whitespace-nowrap"
        style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:white">
        Todos
      </button>
      <button onclick="filterCategory('restaurantes')" data-cat="restaurantes" data-color="#f97316"
        class="cat-btn shrink-0 px-3 py-1.5 rounded-full text-[11px] font-semibold border border-white/[.06] text-gray-400 transition-all whitespace-nowrap hover:text-white">
        🍽️ Restauração
      </button>
      <button onclick="filterCategory('alojamento')" data-cat="alojamento" data-color="#14b8a6"
        class="cat-btn shrink-0 px-3 py-1.5 rounded-full text-[11px] font-semibold border border-white/[.06] text-gray-400 transition-all whitespace-nowrap hover:text-white">
        🏨 Alojamento
      </button>
      <button onclick="filterCategory('saude')" data-cat="saude" data-color="#3b82f6"
        class="cat-btn shrink-0 px-3 py-1.5 rounded-full text-[11px] font-semibold border border-white/[.06] text-gray-400 transition-all whitespace-nowrap hover:text-white">
        🏥 Saúde
      </button>
      <button onclick="filterCategory('beleza')" data-cat="beleza" data-color="#ec4899"
        class="cat-btn shrink-0 px-3 py-1.5 rounded-full text-[11px] font-semibold border border-white/[.06] text-gray-400 transition-all whitespace-nowrap hover:text-white">
        💈 Beleza
      </button>
      <button onclick="filterCategory('ginasios')" data-cat="ginasios" data-color="#8b5cf6"
        class="cat-btn shrink-0 px-3 py-1.5 rounded-full text-[11px] font-semibold border border-white/[.06] text-gray-400 transition-all whitespace-nowrap hover:text-white">
        💪 Ginásios
      </button>
      <button onclick="filterCategory('comercio')" data-cat="comercio" data-color="#eab308"
        class="cat-btn shrink-0 px-3 py-1.5 rounded-full text-[11px] font-semibold border border-white/[.06] text-gray-400 transition-all whitespace-nowrap hover:text-white">
        🛒 Comércio
      </button>
      <button onclick="filterCategory('automovel')" data-cat="automovel" data-color="#64748b"
        class="cat-btn shrink-0 px-3 py-1.5 rounded-full text-[11px] font-semibold border border-white/[.06] text-gray-400 transition-all whitespace-nowrap hover:text-white">
        🔧 Automóvel
      </button>
      <button onclick="filterCategory('servicos_prof')" data-cat="servicos_prof" data-color="#6366f1"
        class="cat-btn shrink-0 px-3 py-1.5 rounded-full text-[11px] font-semibold border border-white/[.06] text-gray-400 transition-all whitespace-nowrap hover:text-white">
        📋 Serv. Prof.
      </button>
      <button onclick="filterCategory('turismo')" data-cat="turismo" data-color="#10b981"
        class="cat-btn shrink-0 px-3 py-1.5 rounded-full text-[11px] font-semibold border border-white/[.06] text-gray-400 transition-all whitespace-nowrap hover:text-white">
        🎭 Turismo
      </button>
      <button onclick="filterCategory('turismo_natureza')" data-cat="turismo_natureza" data-color="#0891b2"
        class="cat-btn shrink-0 px-3 py-1.5 rounded-full text-[11px] font-semibold border border-white/[.06] text-gray-400 transition-all whitespace-nowrap hover:text-white">
        🐋 Natureza
      </button>
      <button onclick="filterCategory('desporto')" data-cat="desporto" data-color="#facc15"
        class="cat-btn shrink-0 px-3 py-1.5 rounded-full text-[11px] font-semibold border border-white/[.06] text-gray-400 transition-all whitespace-nowrap hover:text-white">
        ⚽ Desporto
      </button>
    </div>
    <!-- Fade right edge -->
    <div class="absolute right-0 top-0 bottom-0 w-10 pointer-events-none" style="background:linear-gradient(to right,transparent,rgba(6,10,16,.95))"></div>
  </div>

  <!-- Row 3: Island filter + contact chips + freshness -->
  <div class="flex items-center gap-2 px-3 py-1.5 overflow-x-auto island-scroll">
    <!-- Island chips -->
    <button onclick="filterIsland('')" data-island="" class="island-btn shrink-0 px-2.5 py-1 rounded-lg text-[10px] font-semibold border border-white/[.06] text-gray-500 transition-all whitespace-nowrap" style="background:rgba(255,255,255,.06);color:white;border-color:rgba(255,255,255,.15)">
      🏝️ Todas
    </button>
    <button onclick="filterIsland('Sao Miguel')" data-island="Sao Miguel" class="island-btn shrink-0 px-2.5 py-1 rounded-lg text-[10px] font-semibold border border-white/[.06] text-gray-500 transition-all whitespace-nowrap">São Miguel</button>
    <button onclick="filterIsland('Terceira')" data-island="Terceira" class="island-btn shrink-0 px-2.5 py-1 rounded-lg text-[10px] font-semibold border border-white/[.06] text-gray-500 transition-all whitespace-nowrap">Terceira</button>
    <button onclick="filterIsland('Faial')" data-island="Faial" class="island-btn shrink-0 px-2.5 py-1 rounded-lg text-[10px] font-semibold border border-white/[.06] text-gray-500 transition-all whitespace-nowrap">Faial</button>
    <button onclick="filterIsland('Pico')" data-island="Pico" class="island-btn shrink-0 px-2.5 py-1 rounded-lg text-[10px] font-semibold border border-white/[.06] text-gray-500 transition-all whitespace-nowrap">Pico</button>
    <button onclick="filterIsland('Sao Jorge')" data-island="Sao Jorge" class="island-btn shrink-0 px-2.5 py-1 rounded-lg text-[10px] font-semibold border border-white/[.06] text-gray-500 transition-all whitespace-nowrap">S. Jorge</button>
    <button onclick="filterIsland('Flores')" data-island="Flores" class="island-btn shrink-0 px-2.5 py-1 rounded-lg text-[10px] font-semibold border border-white/[.06] text-gray-500 transition-all whitespace-nowrap">Flores</button>
    <button onclick="filterIsland('Graciosa')" data-island="Graciosa" class="island-btn shrink-0 px-2.5 py-1 rounded-lg text-[10px] font-semibold border border-white/[.06] text-gray-500 transition-all whitespace-nowrap">Graciosa</button>
    <button onclick="filterIsland('Santa Maria')" data-island="Santa Maria" class="island-btn shrink-0 px-2.5 py-1 rounded-lg text-[10px] font-semibold border border-white/[.06] text-gray-500 transition-all whitespace-nowrap">Sta. Maria</button>
    <button onclick="filterIsland('Corvo')" data-island="Corvo" class="island-btn shrink-0 px-2.5 py-1 rounded-lg text-[10px] font-semibold border border-white/[.06] text-gray-500 transition-all whitespace-nowrap">Corvo</button>

    <div class="h-4 w-px bg-white/[.06] shrink-0 mx-0.5"></div>

    <!-- Contact filters -->
    <button onclick="toggleContactFilter('phone')" id="cf-phone"
      class="cf-btn shrink-0 px-2.5 py-1 rounded-lg text-[10px] font-semibold border border-white/[.06] text-gray-500 transition-all whitespace-nowrap">
      📞 Tem Tel.
    </button>
    <button onclick="toggleContactFilter('email')" id="cf-email"
      class="cf-btn shrink-0 px-2.5 py-1 rounded-lg text-[10px] font-semibold border border-white/[.06] text-gray-500 transition-all whitespace-nowrap">
      ✉️ Tem Email
    </button>

    <div id="data-freshness" class="text-[9px] text-gray-700 shrink-0 ml-auto whitespace-nowrap"></div>
  </div>
</div>

<!-- ══ MAP ══ -->
<div id="map"></div>

<!-- ══ RESULT COUNT PILL ══ -->
<div id="result-pill" class="fixed z-20 pointer-events-none"
  style="bottom:24px;left:50%;transform:translateX(-50%);display:none">
  <div class="px-3 py-1.5 rounded-full text-[11px] font-semibold"
    style="background:rgba(6,10,16,.85);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px);color:#9ca3af">
    <span id="result-count"></span>
  </div>
</div>

<!-- ══ LEGEND ══ -->
<div id="legend" class="fixed z-20 rounded-xl border border-white/[.06] p-2.5" style="top:calc(var(--topbar-h,158px) + 10px);right:10px;background:rgba(6,10,16,.88);backdrop-filter:blur(10px)">
  <div class="text-[8px] text-gray-600 font-semibold uppercase tracking-widest mb-1.5">Score</div>
  <div class="flex items-center gap-1.5 text-[9px] text-gray-500 mb-1">
    <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:#ef4444"></div> ≥60
  </div>
  <div class="flex items-center gap-1.5 text-[9px] text-gray-500 mb-1">
    <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:#f97316"></div> 40–59
  </div>
  <div class="flex items-center gap-1.5 text-[9px] text-gray-500">
    <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:#eab308"></div> 20–39
  </div>
</div>

<!-- ══ BOTTOM BAR ══ -->
<div id="bottom-bar" class="fixed bottom-0 inset-x-0 z-30 hidden-bar"
  style="background:rgba(6,10,16,.97);backdrop-filter:blur(18px);border-top:1px solid rgba(255,255,255,.07)">
  <div class="flex items-center gap-3 px-4 h-[72px] max-w-xl mx-auto">
    <!-- Count + quality -->
    <div class="flex-1 min-w-0">
      <div class="flex items-baseline gap-1.5">
        <span id="bar-count" class="text-[26px] font-black text-[#10f5a0] leading-none">0</span>
        <span class="text-gray-500 text-[11px]">selecionados</span>
      </div>
      <div class="text-[10px] text-gray-600 mt-0.5 truncate" id="bar-tier"></div>
      <div class="text-[9px] text-gray-700 mt-0.5 truncate" id="bar-quality"></div>
    </div>

    <!-- Clear -->
    <button onclick="clearSelection()" class="shrink-0 w-8 h-8 rounded-lg flex items-center justify-center transition-all hover:bg-white/[.08]"
      style="border:1px solid rgba(255,255,255,.08)" title="Limpar seleção">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>

    <!-- Price -->
    <div class="text-right shrink-0">
      <div id="bar-price" class="text-[22px] font-black text-white leading-none">€0</div>
      <div class="text-[9px] text-gray-600">pag. único</div>
    </div>

    <!-- Pay CTA -->
    <button onclick="handlePayment()" id="pay-btn"
      class="shrink-0 px-5 py-2.5 rounded-xl font-bold text-[13px] text-[#060a10] transition-all active:scale-95"
      style="background:linear-gradient(135deg,#10f5a0,#06d6a0);min-width:72px">
      Pagar
    </button>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const STRIPE_STARTER = 'https://buy.stripe.com/dRm00jgvj4h461C6FtdUY00';
const STRIPE_HUNTER  = 'https://buy.stripe.com/bJe4gzbaZcNAey86FtdUY01';

const CAT_COLORS = {
  restaurantes:     '#f97316',
  alojamento:       '#14b8a6',
  saude:            '#3b82f6',
  beleza:           '#ec4899',
  ginasios:         '#8b5cf6',
  comercio:         '#eab308',
  automovel:        '#64748b',
  servicos_prof:    '#6366f1',
  turismo:          '#10b981',
  turismo_natureza: '#0891b2',
  desporto:         '#facc15',
  clinicas:         '#3b82f6',
  saloes:           '#ec4899',
  servicos:         '#64748b'
};

const CAT_NAMES = {
  restaurantes:     'Restauração',
  alojamento:       'Alojamento',
  saude:            'Saúde',
  beleza:           'Beleza & Estética',
  ginasios:         'Ginásio / Fitness',
  comercio:         'Comércio',
  automovel:        'Automóvel',
  servicos_prof:    'Serviços Prof.',
  turismo:          'Turismo & Lazer',
  turismo_natureza: 'Turismo de Natureza',
  desporto:         'Clubes Desportivos',
  clinicas:         'Saúde',
  saloes:           'Beleza & Estética',
  servicos:         'Serviços'
};

const GAP_LABELS = {
  sem_website:        'Sem website',
  sem_reservas:       'Sem reservas online',
  sem_whatsapp:       'Sem WhatsApp Business',
  sem_redes_sociais:  'Sem redes sociais',
  sem_email:          'Sem email no site',
  sem_analytics:      'Sem Google Analytics',
  sem_facebook_pixel: 'Sem Facebook Pixel',
  sem_ssl:            'Sem SSL',
  sem_mobile:         'Não mobile-friendly'
};

const ISLAND_CENTERS = {
  'Sao Miguel':  { c: [37.78, -25.5],  z: 11 },
  'Terceira':    { c: [38.73, -27.22], z: 11 },
  'Faial':       { c: [38.57, -28.7],  z: 12 },
  'Pico':        { c: [38.47, -28.3],  z: 11 },
  'Sao Jorge':   { c: [38.66, -28.06], z: 12 },
  'Flores':      { c: [39.47, -31.2],  z: 13 },
  'Graciosa':    { c: [39.05, -28.0],  z: 13 },
  'Santa Maria': { c: [36.97, -25.1],  z: 13 },
  'Corvo':       { c: [39.68, -31.12], z: 14 },
};

// ── STATE ──────────────────────────────────────────────────────
let allBusinesses = [];
let visibleMarkers = {};
let selectedIds = new Set();
let currentCategory = 'all';
let currentIsland = '';
let searchQuery = '';
let contactFilter = { phone: false, email: false };
let map;
let searchTimer;

// ── INIT ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const [res, metaRes] = await Promise.all([
    fetch('data/businesses.json'),
    fetch('data/meta.json').catch(() => null)
  ]);
  allBusinesses = await res.json();

  if (metaRes && metaRes.ok) {
    const meta = await metaRes.json();
    if (meta.last_updated) {
      const d = new Date(meta.last_updated + 'T00:00:00');
      const label = d.toLocaleDateString('pt-PT', { day: '2-digit', month: 'short', year: 'numeric' });
      document.getElementById('data-freshness').textContent = 'Actualizados ' + label;
    }
  }

  allBusinesses.forEach(b => {
    if (!b.gaps || b.gaps.length === 0) b.gaps = computeGaps(b);
  });

  // Set CSS var for topbar height
  const tb = document.getElementById('topbar');
  const setTopbarH = () => {
    document.documentElement.style.setProperty('--topbar-h', tb.offsetHeight + 'px');
    const leg = document.getElementById('legend');
    leg.style.top = (tb.offsetHeight + 10) + 'px';
  };
  setTopbarH();
  new ResizeObserver(setTopbarH).observe(tb);

  map = L.map('map', { center: [38.4, -27.2], zoom: 8, zoomControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  renderMarkers();
  document.getElementById('loading').style.display = 'none';
});

// ── GAPS ───────────────────────────────────────────────────────
function computeGaps(b) {
  const g = [];
  if (!b.has_website)        g.push('sem_website');
  if (!b.has_booking)        g.push('sem_reservas');
  if (!b.whatsapp)           g.push('sem_whatsapp');
  if (!b.has_analytics)      g.push('sem_analytics');
  if (!b.has_facebook_pixel) g.push('sem_facebook_pixel');
  if (b.has_website && !b.has_ssl)            g.push('sem_ssl');
  if (b.has_website && !b.is_mobile_friendly) g.push('sem_mobile');
  return g;
}

// ── SCORE COLOR ────────────────────────────────────────────────
function scoreColor(score) {
  if (score >= 60) return '#ef4444';
  if (score >= 40) return '#f97316';
  if (score >= 20) return '#eab308';
  return '#6b7280';
}

// ── MARKERS ────────────────────────────────────────────────────
function createIcon(b) {
  const sel = selectedIds.has(b.id);
  const color = sel ? '#10f5a0' : scoreColor(b.score);
  const textColor = sel ? '#060a10' : 'white';
  const border = sel ? '3px solid white' : '2px solid rgba(255,255,255,.25)';
  return L.divIcon({
    html: `<div class="lh-marker${sel ? ' selected' : ''}" style="background:${color};border:${border};color:${textColor}">${b.score}</div>`,
    className: '',
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -22]
  });
}

function getFiltered() {
  let list = allBusinesses;
  if (currentCategory !== 'all') list = list.filter(b => b.category === currentCategory);
  if (currentIsland) list = list.filter(b => b.municipality && b.municipality.includes(currentIsland));
  if (contactFilter.phone) list = list.filter(b => b.phone && b.phone !== '-');
  if (contactFilter.email) list = list.filter(b => b.email);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(b => (b.name || '').toLowerCase().includes(q) || (b.municipality || '').toLowerCase().includes(q));
  }
  return list;
}

function renderMarkers() {
  Object.values(visibleMarkers).forEach(m => map.removeLayer(m));
  visibleMarkers = {};

  const filtered = getFiltered();

  filtered.forEach(b => {
    const marker = L.marker([b.lat, b.lng], { icon: createIcon(b) }).addTo(map);
    marker.bindPopup(buildPopupHTML(b), { maxWidth: 320, minWidth: 270 });
    marker.on('popupopen', () => {
      const btn = document.getElementById(`sel-btn-${b.id}`);
      if (btn) btn.addEventListener('click', e => { e.stopPropagation(); toggleSelect(b.id); map.closePopup(); });
    });
    visibleMarkers[b.id] = marker;
  });

  // Result count pill
  const pill = document.getElementById('result-pill');
  const countEl = document.getElementById('result-count');
  if (currentCategory !== 'all' || currentIsland || searchQuery) {
    countEl.textContent = `${filtered.length} negócio${filtered.length !== 1 ? 's' : ''}`;
    pill.style.display = 'block';
  } else {
    pill.style.display = 'none';
  }
}

function refreshMarkerIcon(id) {
  const marker = visibleMarkers[id];
  const b = allBusinesses.find(x => x.id === id);
  if (marker && b) marker.setIcon(createIcon(b));
}

// ── UTILS ──────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── POPUP HTML ─────────────────────────────────────────────────
function buildPopupHTML(b) {
  const color = scoreColor(b.score);
  const catColor = CAT_COLORS[b.category] || '#6b7280';
  const isSelected = selectedIds.has(b.id);
  const gapCount = b.gaps.length;
  const canSelect = !isSelected && selectedIds.size >= 3;

  const tier = b.score >= 60
    ? { label: '🔥 Oportunidade Crítica', color: '#ef4444', bg: 'rgba(239,68,68,.08)' }
    : b.score >= 40
    ? { label: '⚡ Alta Prioridade', color: '#f97316', bg: 'rgba(249,115,22,.08)' }
    : { label: '💡 Potencial Médio', color: '#eab308', bg: 'rgba(234,179,8,.08)' };

  const hasPhone = b.phone && b.phone !== '-';
  const hasEmail = !!b.email;
  const hasWA    = !!b.whatsapp;
  const cs = (hasPhone ? 1 : 0) + (hasEmail ? 1 : 0) + (hasWA ? 1 : 0);
  const ctIcons = [hasPhone ? '📞' : '', hasEmail ? '✉️' : '', hasWA ? '💬' : ''].filter(Boolean).join(' ');
  const ctLabel = cs >= 2 ? 'Contacto completo' : cs === 1 ? 'Contacto parcial' : 'Sem contacto';
  const ctColor = cs >= 2 ? '#16a34a' : cs === 1 ? '#ca8a04' : '#9b3a3a';
  const ctBg    = cs >= 2 ? 'rgba(22,163,74,.08)' : cs === 1 ? 'rgba(202,138,4,.08)' : 'rgba(155,58,58,.08)';

  const btnBg = isSelected ? '#0f2a1a' : 'linear-gradient(135deg,#10f5a0,#06d6a0)';
  const btnCol = isSelected ? '#10f5a0' : '#060a10';
  const btnBorder = isSelected ? '1px solid rgba(16,245,160,.35)' : 'none';
  const btnTxt = isSelected ? '✓ Selecionado — toca para remover' : canSelect ? 'Limite atingido (3 negócios)' : 'Selecionar — incluir no relatório';

  return `<div style="font-family:Inter,sans-serif">
    <div style="padding:15px 15px 10px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:14px;color:white;line-height:1.3;margin-bottom:6px">${esc(b.name)}</div>
          <div style="display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:9.5px;font-weight:700;background:${catColor}18;color:${catColor};border:1px solid ${catColor}25">${esc(CAT_NAMES[b.category] || b.category)}</div>
        </div>
        <div style="text-align:center;flex-shrink:0;margin-top:2px">
          <div style="width:42px;height:42px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:white;border:2px solid rgba(255,255,255,.15);box-shadow:0 4px 14px ${color}45">${b.score}</div>
          <div style="font-size:7px;color:#6b7280;margin-top:2px;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Score</div>
        </div>
      </div>
      <div style="color:#6b7280;font-size:10.5px;margin-top:7px;display:flex;align-items:center;gap:4px">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${esc((b.municipality || '').replace(', Acores', ', Açores'))}
      </div>
    </div>

    <div style="margin:0 12px 10px;padding:7px 11px;border-radius:9px;background:${tier.bg};border:1px solid ${tier.color}20">
      <div style="font-size:10px;font-weight:700;color:${tier.color}">${tier.label}</div>
    </div>

    <div style="margin:0 12px 8px;display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:${ctBg};border:1px solid ${ctColor}20">
      <div style="font-size:9.5px;font-weight:700;color:${ctColor}">${ctLabel}</div>
      ${ctIcons ? `<div style="font-size:11px;margin-left:auto">${ctIcons}</div>` : ''}
    </div>

    <div style="margin:0 12px 12px;padding:10px 12px;border-radius:9px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:#4b5563;font-weight:700">Gaps identificados</div>
        <div style="font-size:13px;font-weight:900;color:white">${gapCount}</div>
      </div>
      <div style="font-size:9.5px;color:#374151">Detalhes completos no PDF após pagamento 🔒</div>
    </div>

    <div style="padding:0 12px 14px">
      <button id="sel-btn-${b.id}" ${canSelect ? 'disabled' : ''}
        style="width:100%;padding:11px;border-radius:11px;font-weight:700;font-size:12px;cursor:${canSelect ? 'not-allowed' : 'pointer'};border:${btnBorder};background:${btnBg};color:${btnCol};opacity:${canSelect ? '.4' : '1'};transition:all .15s;letter-spacing:.01em">
        ${btnTxt}
      </button>
      ${!isSelected && !canSelect && selectedIds.size === 0 ? `<div style="margin-top:6px;font-size:9px;color:#4b5563;text-align:center">1 negócio = €5 · até 3 negócios = €12</div>` : ''}
    </div>
  </div>`;
}

// ── SELECTION ──────────────────────────────────────────────────
function toggleSelect(id) {
  if (selectedIds.has(id)) { selectedIds.delete(id); }
  else { if (selectedIds.size >= 3) return; selectedIds.add(id); }
  refreshMarkerIcon(id);
  updateUI();
}

function clearSelection() {
  const ids = Array.from(selectedIds);
  selectedIds.clear();
  ids.forEach(id => refreshMarkerIcon(id));
  updateUI();
}

function updateUI() {
  const count = selectedIds.size;
  const price = count === 0 ? 0 : count === 1 ? 5 : 12;
  const tier = count === 0
    ? ''
    : count === 1
    ? 'Relatório individual — 1 negócio · €5'
    : `Relatório pack — ${count} negócios · €12`;

  const bar = document.getElementById('bottom-bar');
  const mapEl = document.getElementById('map');
  const resultPill = document.getElementById('result-pill');

  if (count > 0) {
    bar.classList.remove('hidden-bar');
    mapEl.classList.add('bar-open');
    resultPill.style.display = 'none'; // hide result count when bar is open
  } else {
    bar.classList.add('hidden-bar');
    mapEl.classList.remove('bar-open');
  }

  const selArr = Array.from(selectedIds).map(id => allBusinesses.find(b => b.id === id)).filter(Boolean);
  const withPhone = selArr.filter(b => b.phone && b.phone !== '-').length;
  const withEmail = selArr.filter(b => b.email).length;

  document.getElementById('bar-count').textContent = count;
  document.getElementById('bar-price').textContent = price > 0 ? `€${price}` : '€0';
  document.getElementById('bar-tier').textContent = tier;
  document.getElementById('bar-quality').textContent = count > 0 ? `${withPhone} com telefone · ${withEmail} com email` : '';

  const topCounter = document.getElementById('top-counter');
  if (count > 0) {
    topCounter.classList.remove('hidden'); topCounter.classList.add('flex');
  } else {
    topCounter.classList.add('hidden'); topCounter.classList.remove('flex');
  }
  document.getElementById('top-count').textContent = count;
  document.getElementById('top-price').textContent = price > 0 ? `€${price}` : '';

  const el = document.getElementById('bar-count');
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
}

// ── SEARCH ─────────────────────────────────────────────────────
function onSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQuery = val.trim(); renderMarkers(); }, 250);
}

// ── CATEGORY FILTER ────────────────────────────────────────────
function filterCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(btn => {
    const active = btn.dataset.cat === cat;
    const color = btn.dataset.color || '#10f5a0';
    if (active && cat !== 'all') {
      btn.style.background = color + '22';
      btn.style.color = color;
      btn.style.borderColor = color + '55';
    } else if (active) {
      btn.style.background = 'rgba(255,255,255,.1)';
      btn.style.color = 'white';
      btn.style.borderColor = 'rgba(255,255,255,.2)';
    } else {
      btn.style.background = 'transparent';
      btn.style.color = '#6b7280';
      btn.style.borderColor = 'rgba(255,255,255,.06)';
    }
  });
  renderMarkers();
}

// ── ISLAND FILTER ──────────────────────────────────────────────
function filterIsland(island) {
  currentIsland = island;
  document.querySelectorAll('.island-btn').forEach(btn => {
    const active = btn.dataset.island === island;
    btn.style.background = active ? 'rgba(255,255,255,.1)' : 'transparent';
    btn.style.color = active ? 'white' : '#6b7280';
    btn.style.borderColor = active ? 'rgba(255,255,255,.2)' : 'rgba(255,255,255,.06)';
  });

  if (island && ISLAND_CENTERS[island]) {
    const { c, z } = ISLAND_CENTERS[island];
    map.flyTo(c, z, { animate: true, duration: 0.8 });
  } else if (!island) {
    map.flyTo([38.4, -27.2], 8, { animate: true, duration: 0.8 });
  }
  renderMarkers();
}

// ── CONTACT FILTER ─────────────────────────────────────────────
function toggleContactFilter(type) {
  contactFilter[type] = !contactFilter[type];
  const btn = document.getElementById('cf-' + type);
  if (contactFilter[type]) {
    btn.style.background = 'rgba(16,245,160,.15)';
    btn.style.color = '#10f5a0';
    btn.style.borderColor = 'rgba(16,245,160,.3)';
  } else {
    btn.style.background = 'transparent';
    btn.style.color = '#6b7280';
    btn.style.borderColor = 'rgba(255,255,255,.06)';
  }
  renderMarkers();
}

// ── PAYMENT ────────────────────────────────────────────────────
function handlePayment() {
  if (selectedIds.size === 0) return;
  const ids = Array.from(selectedIds).join('-');
  const plan = selectedIds.size === 1 ? 'starter' : 'hunter';
  const base = plan === 'starter' ? STRIPE_STARTER : STRIPE_HUNTER;
  window.location.href = `${base}?client_reference_id=${ids}`;
}
</script>
