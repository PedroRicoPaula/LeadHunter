<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 48" width="210" height="48" role="img" aria-label="LeadHunter">
  <defs>
    <filter id="dot-glow-l" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ring-glow-l" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer pulse ring (dashed) -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#047857"
          stroke-width="0.8" stroke-dasharray="2.5 4" opacity="0.3"/>

  <!-- Main ring -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="#047857"
          stroke-width="1.5" filter="url(#ring-glow-l)"/>

  <!-- Crosshair lines -->
  <line x1="24" y1="2"  x2="24" y2="19" stroke="#047857" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="29" x2="24" y2="46" stroke="#047857" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2"  y1="24" x2="19" y2="24" stroke="#047857" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="24" x2="46" y2="24" stroke="#047857" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Inner ring -->
  <circle cx="24" cy="24" r="5.5" fill="none" stroke="#047857"
          stroke-width="1" opacity="0.55"/>

  <!-- Center dot -->
  <circle cx="24" cy="24" r="2.5" fill="#047857" filter="url(#dot-glow-l)"/>

  <!-- Wordmark -->
  <text x="60" y="31"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="22"
        letter-spacing="-0.4">
    <tspan font-weight="300" fill="#1e293b">Lead</tspan><tspan font-weight="800" fill="#047857">Hunter</tspan>
  </text>
</svg>
